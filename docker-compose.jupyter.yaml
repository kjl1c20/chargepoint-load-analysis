services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    ports:
      - "8888:8888"
    volumes:
      # Mount notebook for live editing
      - ./sense-quickstart-notebook.ipynb:/notebooks/sense-quickstart-notebook.ipynb
      # Optional: mount a .env file for credentials
      - ./.env:/notebooks/.env:ro
    environment:
      - SENSE_CLIENT_ID=${SENSE_CLIENT_ID:-}
      - SENSE_CLIENT_SECRET=${SENSE_CLIENT_SECRET:-}
